server {
    listen       8080;
    server_name  _;

    root /usr/share/nginx/html;

    location /blueprintgen/ {
        try_files $uri $uri/ /blueprintgen/index.html;
    }

    # Pas de cache sur config.js : surchargé par l'entrypoint au démarrage
    location = /blueprintgen/config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # Cache long terme pour les assets buildés (hash dans le nom de fichier)
    location /blueprintgen/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
