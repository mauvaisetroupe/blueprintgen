server {
    listen       8080;
    server_name  _;

    # L'app Vue est déployée sous /blueprintgen/
    root /usr/share/nginx/html;
    index index.html;

    location /blueprintgen/ {
        try_files $uri $uri/ /blueprintgen/index.html;
    }

    # Pas de cache sur config.js : c'est lui qui est surchargé par le ConfigMap
    location = /blueprintgen/config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # Cache long terme pour les assets buildés (hash dans le nom de fichier)
    location /blueprintgen/assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
